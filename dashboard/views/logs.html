{{define "content"}}
<section class="space-y-4">
	<div>
		<div class="text-sm text-muted-foreground">{{.ID}}</div>
		<div class="text-2xl font-semibold">{{.Name}} logs</div>
		<div class="text-sm text-muted-foreground">Recent runtime log output</div>
	</div>
	<div class="text-sm text-muted-foreground">Status: {{.Status}}</div>
	<div class="flex gap-2">
		<a href="/apps/{{.ID}}/logs" class="px-3 py-2 rounded border border-border text-sm">Refresh</a>
		<a href="/apps/{{.ID}}/compose" class="px-3 py-2 rounded border border-border text-sm">Open compose</a>
	</div>
	<div class="rounded border border-border bg-card p-4 overflow-x-auto">
		<pre class="text-xs text-muted-foreground whitespace-pre-wrap">{{.LogsContent}}</pre>
	</div>
</section>
{{end}}
