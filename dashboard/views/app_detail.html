{{define "content"}}
<section class="space-y-4">
	<div>
		<h2 class="text-2xl font-semibold">{{.Name}}</h2>
		<div class="text-sm text-muted-foreground">ID: {{.ID}}</div>
	</div>
	<div class="grid gap-3 md:grid-cols-2">
		<div class="rounded border border-border bg-card p-4">
			<div class="font-semibold">Runtime</div>
			<p class="text-sm text-muted-foreground">Image: {{.Image}}</p>
			<p class="text-sm text-muted-foreground">Ports: {{.PortsStr}}</p>
			<p class="text-sm text-muted-foreground">CPU: {{.CPUPercent}} / Memory: {{.MemoryMB}}</p>
			<div class="mt-3">{{template "status_badge" .Status}}</div>
		</div>
		<div class="rounded border border-border bg-card p-4">
			<div class="font-semibold">Actions</div>
			<div class="mt-2">{{template "container_actions" .}}</div>
			<div class="mt-3 space-y-2">
				<a href="/apps/{{.ID}}/compose" class="inline-block px-3 py-2 rounded border border-border text-sm">Compose</a>
				<a href="/apps/{{.ID}}/logs" class="inline-block px-3 py-2 rounded border border-border text-sm">Logs</a>
			</div>
		</div>
	</div>
</section>
{{end}}
