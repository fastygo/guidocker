{{define "content"}}
<section class="space-y-4">
	<div class="flex items-start justify-between gap-3">
		<div>
			<div class="text-sm text-muted-foreground">App ID: {{.ID}}</div>
			<h2 class="text-2xl font-semibold">{{.Name}}</h2>
		</div>
		{{template "status_badge" .Status}}
	</div>
	<div class="grid gap-3 md:grid-cols-2">
		<div class="rounded border border-border bg-card p-4 space-y-2">
			<div class="font-semibold">Runtime</div>
			<p class="text-sm text-muted-foreground">Stack directory: {{.Dir}}</p>
			<p class="text-sm text-muted-foreground">Ports: {{.PortsStr}}</p>
			<p class="text-sm text-muted-foreground">Updated: {{.UpdatedAt}}</p>
		</div>
		<div class="rounded border border-border bg-card p-4 space-y-3">
			<div class="font-semibold">Public access</div>
			<label class="block text-sm text-muted-foreground">Public domain
				<input id="app-public-domain" type="text" class="mt-1 w-full rounded border border-border bg-background px-2 py-2 text-sm" placeholder="app.example.com" />
			</label>
			<label class="block text-sm text-muted-foreground">Proxy target port
				<input id="app-proxy-target-port" type="number" min="1" max="65535" class="mt-1 w-full rounded border border-border bg-background px-2 py-2 text-sm" placeholder="3000" />
			</label>
			<label class="flex items-center gap-2 text-sm">
				<input id="app-use-tls" type="checkbox" />
				<span>Enable HTTPS on proxy</span>
			</label>
			<label class="block text-sm text-muted-foreground">Managed environment variables
				<textarea id="app-managed-env" class="mt-1 w-full rounded border border-border bg-background p-2 text-sm" rows="6" placeholder="KEY=value\nANOTHER=value"></textarea>
			</label>
			<button type="button" class="px-3 py-2 rounded border border-border text-sm" onclick="saveAppConfig()">Save app settings</button>
			<div id="app-config-feedback" class="text-sm text-muted-foreground"></div>
		</div>
		<div class="rounded border border-border bg-card p-4 space-y-3">
			<div class="font-semibold">Actions</div>
			<div class="flex flex-wrap gap-2">
				<button class="px-3 py-2 rounded border border-border text-sm" onclick="runAppAction('deploy')">Deploy</button>
				<button class="px-3 py-2 rounded border border-border text-sm" onclick="runAppAction('restart')">Restart</button>
				<button class="px-3 py-2 rounded border border-border text-sm" onclick="runAppAction('stop')">Stop</button>
			</div>
			<div class="mt-2">
				<button class="px-3 py-2 rounded border border-destructive text-sm text-destructive" onclick="deleteApp()">Delete</button>
			</div>
			<div id="app-feedback" class="text-sm text-muted-foreground"></div>
			<div class="flex flex-wrap gap-2">
				<a href="/apps/{{.ID}}/compose" class="px-3 py-2 rounded border border-border text-sm">Compose</a>
				<a href="/apps/{{.ID}}/logs" class="px-3 py-2 rounded border border-border text-sm">Logs</a>
			</div>
		</div>
	</div>
</section>
<script>
	async function runAppAction(action) {
		const feedback = document.getElementById('app-feedback');
		if (feedback) feedback.textContent = 'Running ' + action + '...';
		const response = await fetch('/api/apps/' + encodeURIComponent('{{.ID}}') + '/' + action, { method: 'POST' });
		const payload = await response.json().catch(() => ({}));
		if (!response.ok) {
			if (feedback) feedback.textContent = payload.error || 'Action failed';
			return;
		}
		window.location.reload();
	}

	async function deleteApp() {
		if (!confirm('Delete this application? All containers, volumes, and files will be permanently removed.')) {
			return;
		}

		const feedback = document.getElementById('app-feedback');
		if (feedback) feedback.textContent = 'Deleting...';

		const response = await fetch('/api/apps/' + encodeURIComponent('{{.ID}}'), { method: 'DELETE' });
		const payload = await response.json().catch(() => ({}));
		if (!response.ok) {
			if (feedback) feedback.textContent = payload.error || 'Delete failed';
			return;
		}

		window.location.href = '/apps';
	}
</script>
<script>
	function renderManagedEnv(env) {
		if (!env || typeof env !== 'object') return '';
		return Object.entries(env).map(([key, value]) => `${key}=${value}`).join('\n');
	}

	function parseManagedEnv(text) {
		const values = {};
		const lines = text.split('\n');
		for (const raw of lines) {
			const line = raw.trim();
			if (!line || line.startsWith('#')) continue;
			const separator = line.indexOf('=');
			if (separator <= 0) continue;
			const key = line.slice(0, separator).trim();
			const value = line.slice(separator + 1).trim();
			if (!key) continue;
			values[key] = value;
		}
		return values;
	}

	async function loadAppConfig() {
		const response = await fetch('/api/apps/' + encodeURIComponent('{{.ID}}') + '/config', { method: 'GET' });
		const payload = await response.json().catch(() => ({}));
		if (!response.ok) {
			console.warn('Failed to load app config', payload);
			return;
		}

		const domainNode = document.getElementById('app-public-domain');
		const portNode = document.getElementById('app-proxy-target-port');
		const tlsNode = document.getElementById('app-use-tls');
		const envNode = document.getElementById('app-managed-env');
		if (domainNode) domainNode.value = payload.public_domain || '';
		if (portNode) portNode.value = payload.proxy_target_port ? String(payload.proxy_target_port) : '';
		if (tlsNode) tlsNode.checked = !!payload.use_tls;
		if (envNode) envNode.value = renderManagedEnv(payload.managed_env || {});
	}

	async function saveAppConfig() {
		const feedback = document.getElementById('app-config-feedback');
		if (feedback) feedback.textContent = 'Saving app settings...';

		const domainNode = document.getElementById('app-public-domain');
		const portNode = document.getElementById('app-proxy-target-port');
		const tlsNode = document.getElementById('app-use-tls');
		const envNode = document.getElementById('app-managed-env');
		const request = {
			public_domain: domainNode ? domainNode.value.trim() : '',
			proxy_target_port: portNode ? (Number.parseInt(portNode.value, 10) || 0) : 0,
			use_tls: tlsNode ? !!tlsNode.checked : false,
			managed_env: parseManagedEnv(envNode ? envNode.value : ''),
		};

		const response = await fetch('/api/apps/' + encodeURIComponent('{{.ID}}') + '/config', {
			method: 'PUT',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify(request),
		});
		const payload = await response.json().catch(() => ({}));
		if (!response.ok) {
			if (feedback) feedback.textContent = payload.error || 'Failed to save app settings';
			return;
		}
		if (feedback) feedback.textContent = 'App settings saved';
		await loadAppConfig();
	}

	document.addEventListener('DOMContentLoaded', loadAppConfig);
</script>
{{end}}
