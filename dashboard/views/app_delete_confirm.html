{{define "content"}}
<section class="max-w-2xl space-y-4">
	<div>
		<div class="text-sm text-muted-foreground">App ID: {{.ID}}</div>
		<h2 class="text-2xl font-semibold">Delete {{.Name}}?</h2>
	</div>
	<div class="rounded border border-border bg-card p-4 space-y-3">
		<p class="text-sm text-muted-foreground">This will remove the managed application, its runtime, routing configuration, and related files. Use this only when you are sure the app should be removed.</p>
		<div class="flex flex-wrap gap-2">
			<form method="POST" action="/apps/{{.ID}}/delete">
				<button type="submit" class="px-3 py-2 rounded border border-destructive text-sm text-destructive">Delete application</button>
			</form>
			<a href="/apps/{{.ID}}" class="px-3 py-2 rounded border border-border text-sm">Cancel</a>
		</div>
	</div>
</section>
{{end}}
