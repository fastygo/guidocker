{{define "container_actions"}}
{{$id := .ID}}
{{$status := .Status}}
{{if eq $status "running"}}
<form method="POST" action="/apps/{{$id}}/stop" class="inline"><button type="submit" class="px-3 py-2 text-sm rounded border border-border bg-muted text-muted-foreground">Stop</button></form>
<form method="POST" action="/apps/{{$id}}/pause" class="inline"><button type="submit" class="px-3 py-2 text-sm rounded border border-border bg-muted text-muted-foreground">Pause</button></form>
<form method="POST" action="/apps/{{$id}}/restart" class="inline"><button type="submit" class="px-3 py-2 text-sm rounded border border-border bg-accent text-accent-foreground">Restart</button></form>
{{end}}
{{if eq $status "stopped"}}
<form method="POST" action="/apps/{{$id}}/start" class="inline"><button type="submit" class="px-3 py-2 text-sm rounded border border-border bg-primary text-primary-foreground">Start</button></form>
{{end}}
{{if eq $status "paused"}}
<form method="POST" action="/apps/{{$id}}/unpause" class="inline"><button type="submit" class="px-3 py-2 text-sm rounded border border-border bg-accent text-accent-foreground">Unpause</button></form>
<form method="POST" action="/apps/{{$id}}/stop" class="inline"><button type="submit" class="px-3 py-2 text-sm rounded border border-destructive bg-destructive text-destructive-foreground">Stop</button></form>
{{end}}
{{if and (ne $status "running") (ne $status "stopped") (ne $status "paused")}}
<form method="POST" action="/apps/{{$id}}/start" class="inline"><button type="submit" class="px-3 py-2 text-sm rounded border border-border bg-primary text-primary-foreground">Start</button></form>
{{end}}
{{end}}
