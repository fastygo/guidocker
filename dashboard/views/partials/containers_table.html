{{define "containers_table"}}
<table class="w-full">
	<thead class="bg-muted">
		<tr>
			<th class="px-4 py-2 text-left text-xs font-semibold text-muted-foreground min-w-0">Name</th>
			<th class="px-4 py-2 text-left text-xs font-semibold text-muted-foreground min-w-0">Image</th>
			<th class="px-4 py-2 text-left text-xs font-semibold text-muted-foreground min-w-0">Status</th>
			<th class="px-4 py-2 text-left text-xs font-semibold text-muted-foreground min-w-0">Ports</th>
			<th class="px-4 py-2 text-left text-xs font-semibold text-muted-foreground min-w-0">CPU</th>
			<th class="px-4 py-2 text-left text-xs font-semibold text-muted-foreground min-w-0">Memory</th>
			<th class="px-4 py-2 text-left text-xs font-semibold text-muted-foreground">Actions</th>
		</tr>
	</thead>
	<tbody class="divide-y divide-border">
		{{range .}}
		{{template "container_row" .}}
		{{end}}
	</tbody>
</table>
{{end}}
